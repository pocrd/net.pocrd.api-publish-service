services:
  dubbo-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: api-publish-service
    container_name: api-publish-service
    ports:
      - "50053:50053"
      - "50054:50054"
    environment:
      - DUBBO_IP_TO_REGISTRY
    restart: unless-stopped
    volumes:
      - maven-repo:/root/.m2

volumes:
  maven-repo:
    driver: local

    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
